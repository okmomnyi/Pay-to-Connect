<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartWiFi — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#C2777A", "secondary": "#E8A598",
            "on-primary": "#4a1c1f", "on-surface": "#e7e4f0",
            "on-surface-variant": "#acaab5",
            "surface-container-lowest": "#000000",
            "surface-container-low": "#13121c",
            "surface-container": "#191923",
            "surface-container-high": "#1f1f2a",
            "surface-container-highest": "#252531",
            "surface-bright": "#2b2b38",
            "outline-variant": "#484751", "outline": "#76747f",
            "error": "#ff716c"
          },
          fontFamily: {
            "headline": ["Syne", "sans-serif"],
            "body": ["DM Sans", "sans-serif"],
            "mono": ["JetBrains Mono", "monospace"]
          },
          borderRadius: { "xl": "0.75rem", "2xl": "1.5rem", "full": "9999px" }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #000000; color: #e7e4f0; }
    h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

    .pulse-blob-1 {
      position: absolute; top: -10%; left: -10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(194,119,122,0.15) 0%, rgba(194,119,122,0) 70%);
      filter: blur(80px); z-index: 0; pointer-events: none;
    }
    .pulse-blob-2 {
      position: absolute; bottom: -20%; right: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(232,165,152,0.10) 0%, rgba(232,165,152,0) 70%);
      filter: blur(100px); z-index: 0; pointer-events: none;
    }

    .glass-card {
      background: rgba(31,31,42,0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(72,71,81,0.15);
      border-radius: 0.75rem;
    }
    .glass-input {
      background-color: #13121c !important;
      border: 1px solid rgba(72,71,81,0.35) !important;
      color: #e7e4f0 !important;
      border-radius: 0.75rem !important;
      padding: 0.875rem 1.25rem !important;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .glass-input:focus {
      outline: none !important;
      border-color: #C2777A !important;
      box-shadow: 0 0 0 2px rgba(194,119,122,0.2) !important;
      background-color: #191923 !important;
    }
    .glass-input::placeholder { color: rgba(172,170,181,0.55) !important; }

    .btn-gradient { background: linear-gradient(135deg, #C2777A, #E8A598); color: #4a1c1f; }
    .text-gradient {
      background: linear-gradient(135deg, #C2777A, #E8A598);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hidden { display: none !important; }

    /* Pill toggle — login.js adds bg-white/bg-opacity-30/text-white to active, text-blue-200 to inactive */
    #loginTab.bg-white  { background: rgba(194,119,122,0.2) !important; }
    #registerTab.bg-white { background: rgba(194,119,122,0.2) !important; }
    #loginTab.text-blue-200, #registerTab.text-blue-200 { color: #76747f !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-surface-container-lowest text-on-surface antialiased p-4">

<div class="pulse-blob-1"></div>
<div class="pulse-blob-2"></div>

<main class="w-full max-w-md relative z-10">

  <!-- Brand -->
  <div class="text-center mb-10">
    <h1 id="formTitle" class="font-headline text-4xl md:text-5xl font-bold tracking-tighter text-gradient mb-2">Login to Wi-Fi</h1>
    <p id="formSubtitle" class="text-on-surface-variant text-sm font-medium">Access your account to purchase internet</p>
  </div>

  <!-- Auth Card -->
  <div class="glass-card p-6 md:p-8 flex flex-col gap-7 shadow-[0_0_60px_-15px_rgba(232,165,152,0.05)]">

    <!-- Error / Success messages -->
    <div id="errorMessage" class="hidden bg-error/10 border border-error/25 rounded-xl p-3 flex items-center gap-2">
      <span class="material-symbols-outlined text-error text-sm">error</span>
      <span id="errorText" class="text-sm text-on-surface"></span>
    </div>
    <div id="successMessage" class="hidden bg-primary/10 border border-primary/25 rounded-xl p-3 flex items-center gap-2">
      <span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings:'FILL' 1">check_circle</span>
      <span id="successText" class="text-sm text-on-surface"></span>
    </div>

    <!-- Pill Toggle -->
    <div class="flex bg-surface-container-high rounded-full p-1 gap-1">
      <button id="loginTab" class="flex-1 py-2.5 px-4 rounded-full text-sm font-semibold transition-all bg-white bg-opacity-30 text-white">Login</button>
      <button id="registerTab" class="flex-1 py-2.5 px-4 rounded-full text-sm font-semibold transition-all text-blue-200">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="flex flex-col gap-5">
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Username or Email</label>
        <input type="text" id="loginUsername" class="glass-input" placeholder="Username or email" required/>
      </div>
      <div class="flex flex-col gap-2">
        <div class="flex justify-between items-center pl-1 pr-1">
          <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Password</label>
          <a href="/forgot-password" class="text-xs text-primary hover:text-secondary transition-colors">Forgot?</a>
        </div>
        <input type="password" id="loginPassword" class="glass-input" placeholder="Password" required/>
      </div>
      <button type="submit" id="loginButton"
        class="w-full py-3.5 rounded-xl btn-gradient font-bold text-sm flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(194,119,122,0.2)] hover:shadow-[0_0_30px_rgba(194,119,122,0.4)] transition-all mt-1">
        Sign In
      </button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden flex-col gap-5">
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">First Name</label>
          <input type="text" id="firstName" class="glass-input" placeholder="First name" required/>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Last Name</label>
          <input type="text" id="lastName" class="glass-input" placeholder="Last name" required/>
        </div>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Username</label>
        <input type="text" id="registerUsername" class="glass-input" placeholder="Choose a username" required/>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Email</label>
        <input type="email" id="email" class="glass-input" placeholder="Email address" required/>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Phone Number</label>
        <div class="flex items-center bg-surface-container-low rounded-xl border border-[rgba(72,71,81,0.15)] focus-within:border-primary transition-all overflow-hidden">
          <span class="px-4 py-3.5 font-mono text-xs text-on-surface-variant bg-surface-bright border-r border-[rgba(72,71,81,0.15)] shrink-0">+254</span>
          <input type="tel" id="phone" class="w-full bg-transparent border-none text-on-surface font-mono py-3.5 px-3 focus:ring-0 text-sm placeholder:text-outline-variant/60" placeholder="712 345 678" required/>
        </div>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider pl-1">Password</label>
        <input type="password" id="registerPassword" class="glass-input" placeholder="Min 8 characters" required/>
      </div>
      <button type="submit" id="registerButton"
        class="w-full py-3.5 rounded-xl btn-gradient font-bold text-sm flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(194,119,122,0.2)] hover:shadow-[0_0_30px_rgba(194,119,122,0.4)] transition-all mt-1">
        Create Account
      </button>
    </form>

    <!-- Footer -->
    <div class="pt-4 border-t border-[rgba(72,71,81,0.15)] text-center">
      <a href="/" class="text-xs text-on-surface-variant hover:text-primary transition-colors">
        ← Back to Portal
      </a>
    </div>

  </div>
</main>

<script src="login.js"></script>
</body>
</html>
