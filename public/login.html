<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartWiFi — Login</title>
  <link rel="stylesheet" href="portal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind needed for login.js tab toggle classes -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure tab active states look right with our design */
    #loginTab.bg-white, #registerTab.bg-white {
      background: var(--primary) !important;
      color: white !important;
      box-shadow: 0 2px 8px rgba(79,70,229,.3) !important;
    }
    #loginTab.text-blue-200, #registerTab.text-blue-200 {
      color: var(--text-2) !important;
    }
    .gradient-bg {
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%) !important;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Brand -->
    <div class="text-center mb-6">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;box-shadow:0 8px 20px rgba(79,70,229,.45);">
        <i class="fas fa-wifi text-2xl text-white"></i>
      </div>
      <h1 class="text-2xl font-bold text-white" style="letter-spacing:-.02em;">SmartWiFi</h1>
      <p class="text-sm mt-1" style="color:#94a3b8;">Fast &amp; Reliable Internet Access</p>
    </div>

    <!-- Card -->
    <div style="background:#fff;border-radius:20px;padding:28px 28px 24px;box-shadow:0 24px 48px rgba(0,0,0,.22);">

      <!-- Tab toggle -->
      <div class="flex rounded-xl p-1 mb-5"
           style="background:#f1f5f9;border:1.5px solid #e2e8f0;">
        <button id="loginTab"
          class="flex-1 py-2 px-3 rounded-lg font-semibold text-sm transition-all duration-200 bg-white bg-opacity-30 text-white">
          <i class="fas fa-sign-in-alt mr-1"></i> Login
        </button>
        <button id="registerTab"
          class="flex-1 py-2 px-3 rounded-lg font-semibold text-sm transition-all duration-200 text-blue-200">
          <i class="fas fa-user-plus mr-1"></i> Register
        </button>
      </div>

      <!-- Dynamic header -->
      <div class="text-center mb-5">
        <h2 id="formTitle" style="font-size:1.125rem;font-weight:700;color:#1e293b;margin-bottom:3px;">Login to Wi-Fi</h2>
        <p id="formSubtitle" style="font-size:.875rem;color:#64748b;">Access your account to purchase internet</p>
      </div>

      <!-- Alerts -->
      <div id="errorMessage" class="alert alert-error hidden">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>
      <div id="successMessage" class="alert alert-success hidden">
        <i class="fas fa-check-circle"></i>
        <span id="successText"></span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <div class="form-group">
          <label class="form-label" for="loginUsername">Username or Email</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="loginUsername" class="form-input" required
                   placeholder="Enter username or email">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="loginPassword" class="form-input" required
                   placeholder="Enter password">
            <button type="button" class="input-toggle" onclick="toggleVis('loginPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="text-center">
          <a href="/forgot-password" class="text-link">
            <i class="fas fa-key"></i> Forgot password?
          </a>
        </div>

        <button type="submit" id="loginButton" class="btn btn-primary">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div class="form-group" style="margin:0;">
            <label class="form-label" for="firstName">First Name</label>
            <input type="text" id="firstName" class="form-input" required placeholder="First name">
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label" for="lastName">Last Name</label>
            <input type="text" id="lastName" class="form-input" required placeholder="Last name">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="registerUsername">Username</label>
          <div class="input-wrap">
            <i class="fas fa-at input-icon"></i>
            <input type="text" id="registerUsername" class="form-input" required
                   placeholder="Choose a username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-input" required
                   placeholder="you@example.com">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <div class="input-wrap">
            <i class="fas fa-phone input-icon"></i>
            <input type="tel" id="phone" class="form-input" required
                   placeholder="0712 345 678">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="registerPassword">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="registerPassword" class="form-input" required
                   placeholder="Min 6 characters">
            <button type="button" class="input-toggle" onclick="toggleVis('registerPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="registerButton" class="btn btn-success">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

    </div><!-- /card -->

    <!-- Back link -->
    <div class="text-center mt-4">
      <a href="/" class="text-sm" style="color:#64748b;text-decoration:none;">
        <i class="fas fa-arrow-left"></i> Back to Portal
      </a>
    </div>

  </div>

  <script>
  function toggleVis(id, btn) {
    const inp = document.getElementById(id);
    const ico = btn.querySelector('i');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
  }
  </script>
  <script src="login.js"></script>
</body>
</html>
