<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartWiFi — My Profile</title>
  <link rel="stylesheet" href="portal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind needed for profile.js dynamic classes -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div class="page-wrapper" style="justify-content:flex-start; padding-top:32px; padding-bottom:40px;">
  <div class="page-container page-container--wide">

    <!-- Nav -->
    <div class="portal-nav">
      <a href="/portal" class="nav-link">
        <i class="fas fa-arrow-left"></i> Back to Portal
      </a>
      <button onclick="logout()" class="nav-link danger">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>

    <!-- Profile Card -->
    <div class="card" style="margin-bottom:16px; padding:0; overflow:hidden;">
      <div class="profile-header">
        <div id="avatar" class="profile-avatar">👤</div>
        <div id="profile-name" class="profile-name">Loading...</div>
        <div id="profile-email" class="profile-email">—</div>
        <div style="display:flex; justify-content:center; gap:8px; margin-top:12px;">
          <span id="profile-status" class="badge badge-gray">Loading...</span>
          <span id="security-status" class="badge badge-amber">Loading...</span>
        </div>
      </div>

      <div style="padding:20px 28px;">
        <div class="data-row">
          <span class="data-label"><i class="fas fa-user" style="width:18px;color:var(--primary);"></i> Username</span>
          <span class="data-value" id="username">—</span>
        </div>
        <div class="data-row">
          <span class="data-label"><i class="fas fa-phone" style="width:18px;color:var(--primary);"></i> Phone</span>
          <span class="data-value" id="phone">—</span>
        </div>
        <div class="data-row">
          <span class="data-label"><i class="fas fa-calendar-alt" style="width:18px;color:var(--primary);"></i> Member Since</span>
          <span class="data-value" id="member-since">—</span>
        </div>
        <div class="data-row">
          <span class="data-label"><i class="fas fa-clock" style="width:18px;color:var(--primary);"></i> Last Login</span>
          <span class="data-value" id="last-login">—</span>
        </div>
      </div>
    </div>

    <!-- Security Questions Accordion -->
    <div class="accordion" style="margin-bottom:12px;">
      <button class="accordion-header" onclick="toggleAccordion('security-section')">
        <div class="accordion-title">
          <i class="fas fa-shield-alt"></i>
          Security Questions
          <span id="security-badge-header" class="badge badge-amber" style="font-size:.65rem;">Not Set</span>
        </div>
        <i id="security-icon" class="fas fa-chevron-down accordion-chevron"></i>
      </button>
      <div id="security-section" class="accordion-body">
        <div class="accordion-inner">
          <p style="font-size:.875rem; color:var(--text-2); margin-bottom:16px;">
            Set 3 security questions to protect and recover your account.
          </p>
          <form id="security-form">
            <div id="security-questions-container" style="display:flex; flex-direction:column; gap:12px;"></div>
            <button type="submit" class="btn btn-primary mt-md">
              <i class="fas fa-save"></i> Save Security Questions
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Change Password Accordion -->
    <div class="accordion" style="margin-bottom:12px;">
      <button class="accordion-header" onclick="toggleAccordion('password-section')">
        <div class="accordion-title">
          <i class="fas fa-key"></i>
          Change Password
        </div>
        <i id="password-icon" class="fas fa-chevron-down accordion-chevron"></i>
      </button>
      <div id="password-section" class="accordion-body">
        <div class="accordion-inner">
          <form id="password-form" style="display:flex; flex-direction:column; gap:14px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label" for="current-password">Current Password</label>
              <input type="password" id="current-password" class="form-input" required>
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label" for="new-password">New Password</label>
              <input type="password" id="new-password" class="form-input" required minlength="8">
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label" for="confirm-password">Confirm New Password</label>
              <input type="password" id="confirm-password" class="form-input" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-lock"></i> Update Password
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Purchase History Accordion -->
    <div class="accordion" style="margin-bottom:24px;">
      <button class="accordion-header" onclick="toggleAccordion('history-section')">
        <div class="accordion-title">
          <i class="fas fa-receipt"></i>
          Purchase History
        </div>
        <i id="history-icon" class="fas fa-chevron-down accordion-chevron"></i>
      </button>
      <div id="history-section" class="accordion-body">
        <div id="purchase-history" class="accordion-inner">
          <div style="text-align:center; color:var(--text-3); padding:16px 0; font-size:.9rem;">
            Loading history...
          </div>
        </div>
      </div>
    </div>

    <!-- Danger zone -->
    <div class="text-center">
      <button onclick="logoutAllSessions()" class="nav-link danger" style="margin:auto;">
        <i class="fas fa-power-off"></i> Logout from all devices
      </button>
    </div>

  </div>
</div>

<!-- Alert container (toast) -->
<div id="alert-container"></div>

<script>
function toggleAccordion(id) {
  const content = document.getElementById(id);
  const icon = document.getElementById(id.replace('section', 'icon'));
  content.classList.toggle('active');
  icon.classList.toggle('active');
}
</script>
<script src="profile.js"></script>
</body>
</html>
