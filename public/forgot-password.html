<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartWiFi — Account Recovery</title>
  <link rel="stylesheet" href="portal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="page-wrapper">
  <div class="page-container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
      <div class="brand-name">Account Recovery</div>
      <div class="brand-tagline">Verify your identity to reset your password</div>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Step indicator -->
      <div class="steps">
        <div class="step-item active" id="step-1">
          <div class="step-circle">1</div>
          <div class="step-label">Identify</div>
        </div>
        <div class="step-line" id="line-1"></div>
        <div class="step-item" id="step-2">
          <div class="step-circle">2</div>
          <div class="step-label">Verify</div>
        </div>
        <div class="step-line" id="line-2"></div>
        <div class="step-item" id="step-3">
          <div class="step-circle">3</div>
          <div class="step-label">Reset</div>
        </div>
      </div>

      <!-- Alert area -->
      <div id="alert-container"></div>

      <!-- ── Step 1: Identity ── -->
      <div id="step-1-content" class="step-content">
        <div class="card-title">Verify Your Identity</div>
        <div class="card-subtitle">Enter your username, email, or phone number.</div>

        <form id="identity-form">
          <div class="form-group">
            <label class="form-label" for="identifier">Username, Email, or Phone</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="identifier" class="form-input" required
                     placeholder="Enter username, email, or phone">
            </div>
          </div>
          <button type="submit" class="btn btn-primary">
            Continue <i class="fas fa-arrow-right"></i>
          </button>
        </form>
      </div>

      <!-- ── Step 2: Security Questions ── -->
      <div id="step-2-content" class="step-content hidden">
        <div class="card-title">Security Questions</div>
        <div class="card-subtitle">Answer the questions you set up on your account.</div>

        <form id="security-form">
          <div id="security-questions-container"></div>
          <button type="submit" class="btn btn-primary">
            Verify Answers <i class="fas fa-check"></i>
          </button>
        </form>
      </div>

      <!-- ── Step 3: New Password ── -->
      <div id="step-3-content" class="step-content hidden">
        <div class="card-title">Set New Password</div>
        <div class="card-subtitle">Choose a strong password for your account.</div>

        <form id="reset-form">
          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="new-password" class="form-input" required minlength="8"
                     placeholder="Minimum 8 characters">
              <button type="button" class="input-toggle" onclick="toggleVis('new-password', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="confirm-password" class="form-input" required minlength="8"
                     placeholder="Re-enter new password">
              <button type="button" class="input-toggle" onclick="toggleVis('confirm-password', this)">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-success">
            <i class="fas fa-key"></i> Reset Password
          </button>
        </form>
      </div>

      <div class="divider"></div>
      <div class="text-center">
        <a href="/login" class="text-link">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>

    </div><!-- /card -->
  </div>
</div>

<script>
function toggleVis(id, btn) {
  const inp = document.getElementById(id);
  const ico = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'fas fa-eye';
  }
}
</script>
<script src="forgot-password.js"></script>
</body>
</html>
