<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartWiFi — Change Password</title>
  <link rel="stylesheet" href="portal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="page-wrapper">
  <div class="page-container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-lock"></i></div>
      <div class="brand-name">Change Password</div>
      <div class="brand-tagline">Update your account security</div>
    </div>

    <div class="card">
      <form id="changePasswordForm" style="display:flex; flex-direction:column; gap:16px;">

        <div class="form-group" style="margin:0;">
          <label class="form-label" for="currentPassword">Current Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="currentPassword" name="currentPassword" required
                   class="form-input" placeholder="Enter current password">
            <button type="button" class="input-toggle toggle-password" data-target="currentPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group" style="margin:0;">
          <label class="form-label" for="newPassword">New Password</label>
          <div class="input-wrap">
            <i class="fas fa-key input-icon"></i>
            <input type="password" id="newPassword" name="newPassword" required minlength="8"
                   class="form-input" placeholder="Minimum 8 characters">
            <button type="button" class="input-toggle toggle-password" data-target="newPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <p style="font-size:.8rem; color:var(--text-3); margin-top:4px;">
            <i class="fas fa-info-circle"></i> At least 8 characters
          </p>
        </div>

        <div class="form-group" style="margin:0;">
          <label class="form-label" for="confirmPassword">Confirm New Password</label>
          <div class="input-wrap">
            <i class="fas fa-key input-icon"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
                   class="form-input" placeholder="Re-enter new password">
            <button type="button" class="input-toggle toggle-password" data-target="confirmPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="display:flex; gap:12px; margin-top:4px;">
          <button type="button" id="cancelButton" class="btn btn-ghost">
            Cancel
          </button>
          <button type="submit" id="changePasswordButton" class="btn btn-primary">
            <i class="fas fa-lock"></i> Change Password
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden" style="position:fixed;top:20px;right:20px;z-index:9999;">
  <div id="toastContent" style="padding:12px 18px; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.2); font-weight:500; font-size:.875rem; color:white; font-family:var(--font);">
    <span id="toastMessage"></span>
  </div>
</div>

<script>
class PasswordChanger {
  constructor() {
    this.form = document.getElementById('changePasswordForm');
    this.cancelButton = document.getElementById('cancelButton');
    this.init();
  }

  init() {
    this.form.addEventListener('submit', this.handleSubmit.bind(this));
    this.cancelButton.addEventListener('click', this.handleCancel.bind(this));

    document.querySelectorAll('.toggle-password').forEach(button => {
      button.addEventListener('click', this.togglePasswordVisibility.bind(this));
    });

    document.getElementById('confirmPassword').addEventListener('input', this.validatePasswordMatch.bind(this));
  }

  togglePasswordVisibility(e) {
    const targetId = e.currentTarget.getAttribute('data-target');
    const input = document.getElementById(targetId);
    const icon = e.currentTarget.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  validatePasswordMatch() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const confirmInput = document.getElementById('confirmPassword');
    if (confirmPassword && newPassword !== confirmPassword) {
      confirmInput.setCustomValidity('Passwords do not match');
      confirmInput.style.borderColor = 'var(--red)';
    } else {
      confirmInput.setCustomValidity('');
      confirmInput.style.borderColor = '';
    }
  }

  async handleSubmit(e) {
    e.preventDefault();
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!currentPassword || !newPassword || !confirmPassword) {
      this.showToast('All fields are required', 'error'); return;
    }
    if (newPassword.length < 8) {
      this.showToast('New password must be at least 8 characters', 'error'); return;
    }
    if (newPassword !== confirmPassword) {
      this.showToast('New passwords do not match', 'error'); return;
    }
    if (currentPassword === newPassword) {
      this.showToast('New password must differ from current password', 'error'); return;
    }

    const submitButton = document.getElementById('changePasswordButton');
    const originalHTML = submitButton.innerHTML;

    try {
      submitButton.disabled = true;
      submitButton.innerHTML = '<span class="spinner"></span> Changing...';

      const token = localStorage.getItem('authToken') || localStorage.getItem('userToken');
      if (!token) throw new Error('Not authenticated. Please login again.');

      const response = await fetch('/api/user/auth/change-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ oldPassword: currentPassword, newPassword })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      if (!data.success) throw new Error(data.error || 'Failed to change password');

      this.showToast('Password changed successfully!', 'success');
      this.form.reset();

      setTimeout(() => { window.location.href = '/profile'; }, 2000);

    } catch (error) {
      console.error('Password change failed:', error);
      this.showToast(error.message, 'error');
    } finally {
      submitButton.disabled = false;
      submitButton.innerHTML = originalHTML;
    }
  }

  handleCancel() {
    if (confirm('Discard changes and go back?')) {
      window.location.href = '/profile';
    }
  }

  showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    const toastContent = document.getElementById('toastContent');
    const toastMessage = document.getElementById('toastMessage');

    toastMessage.textContent = message;
    toastContent.style.background =
      type === 'success' ? '#166534' :
      type === 'error'   ? '#991b1b' :
      type === 'warning' ? '#92400e' : '#1e40af';

    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 5000);
  }
}

document.addEventListener('DOMContentLoaded', () => new PasswordChanger());
</script>
</body>
</html>
