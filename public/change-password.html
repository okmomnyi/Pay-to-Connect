<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartWiFi — Change Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=DM+Sans:opsz,wght@9..40,400..700&family=JetBrains+Mono:wght@400..700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#E8A598", "secondary": "#C2777A",
            "on-primary": "#4a1c1f", "on-surface": "#e7e4f0",
            "on-surface-variant": "#acaab5",
            "surface-container-lowest": "#000000",
            "surface-container-low": "#13121c",
            "surface-container": "#191923",
            "surface-container-high": "#1f1f2a",
            "surface-container-highest": "#252531",
            "surface-bright": "#2b2b38",
            "outline-variant": "#484751", "outline": "#76747f",
            "error": "#ff716c"
          },
          fontFamily: {
            "headline": ["Syne", "sans-serif"],
            "body": ["DM Sans", "sans-serif"],
            "data": ["JetBrains Mono", "monospace"]
          },
          borderRadius: { "xl": "0.75rem", "2xl": "1.5rem", "full": "9999px" }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #000000; color: #e7e4f0; }
    h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }
    .glass-panel {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(72,71,81,0.15);
    }
    .liquid-bg {
      background-image:
        radial-gradient(circle at 20% 30%, rgba(232,165,152,0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(194,119,122,0.08) 0%, transparent 40%);
    }
    .pulse-blob {
      position: absolute;
      filter: blur(100px);
      opacity: 0.4;
      z-index: 0;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite alternate;
    }
    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }
    .input-glow { transition: all 0.2s; }
    .input-glow:focus-within {
      box-shadow: 0 0 0 2px rgba(232,165,152,0.4);
      border-color: #E8A598 !important;
    }
    .btn-gradient {
      background: linear-gradient(135deg, #C2777A, #E8A598);
      color: #4a1c1f;
      box-shadow: 0 0 40px -5px rgba(194,119,122,0.2);
    }
    .hidden { display: none !important; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(74,28,31,0.3);
      border-top-color: #4a1c1f;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body min-h-screen overflow-x-hidden antialiased relative">

<div class="fixed inset-0 overflow-hidden pointer-events-none z-0 liquid-bg">
  <div class="pulse-blob bg-[#E8A598] w-[400px] h-[400px] top-[-100px] left-[-100px]"></div>
  <div class="pulse-blob bg-[#C2777A] w-[500px] h-[500px] bottom-[-200px] right-[-100px]" style="animation-delay:-5s;"></div>
</div>

<main class="relative z-10 w-full min-h-screen flex flex-col items-center justify-center p-6">
  <div class="w-full max-w-sm">

    <!-- Header (outside the card) -->
    <div class="mb-8">
      <div class="inline-flex items-center justify-center w-11 h-11 rounded-xl btn-gradient mb-4 shadow-[0_8px_24px_rgba(194,119,122,0.35)]">
        <span class="material-symbols-outlined text-lg" style="font-variation-settings:'FILL' 1">lock</span>
      </div>
      <h1 class="font-headline font-bold text-4xl tracking-tight text-on-surface">Change Password</h1>
      <p class="text-on-surface-variant mt-1 text-sm">Update your account security</p>
    </div>

    <!-- Glass Card -->
    <div class="glass-panel rounded-xl p-6 relative">

      <form id="changePasswordForm" class="flex flex-col gap-5">

        <div>
          <label class="block text-sm text-on-surface-variant mb-2" for="currentPassword">Current Password</label>
          <div class="input-glow bg-surface-container-low rounded-xl border border-outline-variant/15 flex items-center pr-3">
            <input type="password" id="currentPassword" name="currentPassword" required
              class="w-full bg-transparent border-none text-on-surface focus:ring-0 px-4 py-3 rounded-xl font-data" placeholder="Enter current password"/>
            <button type="button" class="toggle-password text-on-surface-variant hover:text-primary transition-colors shrink-0" data-target="currentPassword">
              <span class="material-symbols-outlined text-sm">visibility</span>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-sm text-on-surface-variant mb-2" for="newPassword">New Password</label>
          <div class="input-glow bg-surface-container-low rounded-xl border border-outline-variant/15 flex items-center pr-3 mb-2">
            <input type="password" id="newPassword" name="newPassword" required minlength="8"
              class="w-full bg-transparent border-none text-on-surface focus:ring-0 px-4 py-3 rounded-xl font-data" placeholder="Minimum 8 characters"/>
            <button type="button" class="toggle-password text-on-surface-variant hover:text-primary transition-colors shrink-0" data-target="newPassword">
              <span class="material-symbols-outlined text-sm">visibility</span>
            </button>
          </div>
          <!-- Password strength meter -->
          <div id="strength-bar" class="flex gap-1 h-1 w-full rounded-full overflow-hidden bg-surface-container-high">
            <div id="strength-s1" class="h-full w-1/3 opacity-20 bg-error rounded-full transition-all"></div>
            <div id="strength-s2" class="h-full w-1/3 opacity-20 bg-[#f59e0b] rounded-full transition-all"></div>
            <div id="strength-s3" class="h-full w-1/3 opacity-20 bg-primary rounded-full transition-all"></div>
          </div>
          <p id="strength-label" class="text-xs text-on-surface-variant mt-1 text-right"></p>
        </div>

        <div>
          <label class="block text-sm text-on-surface-variant mb-2" for="confirmPassword">Confirm New Password</label>
          <div class="input-glow bg-surface-container-low rounded-xl border border-outline-variant/15 flex items-center pr-3">
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
              class="w-full bg-transparent border-none text-on-surface focus:ring-0 px-4 py-3 rounded-xl font-data" placeholder="Re-enter new password"/>
            <button type="button" class="toggle-password text-on-surface-variant hover:text-primary transition-colors shrink-0" data-target="confirmPassword">
              <span class="material-symbols-outlined text-sm">visibility</span>
            </button>
          </div>
        </div>

        <div class="flex gap-3 pt-1">
          <button type="button" id="cancelButton"
            class="flex-1 py-3 rounded-xl bg-surface-container-high border border-outline-variant/25 hover:bg-surface-bright text-on-surface-variant font-medium transition-all text-sm">
            Cancel
          </button>
          <button type="submit" id="changePasswordButton"
            class="flex-1 py-3 rounded-xl btn-gradient font-bold text-sm flex items-center justify-center gap-2 transition-all hover:scale-[1.02] active:scale-[0.98]">
            Change
          </button>
        </div>

      </form>

      <div class="mt-5 pt-4 border-t border-outline-variant/15 text-center">
        <a href="/profile" class="text-xs text-on-surface-variant hover:text-primary transition-colors inline-flex items-center gap-1">
          ← Back to Profile
        </a>
      </div>
    </div>

  </div>
</main>

<div id="toast" class="hidden fixed top-5 right-5 z-50 max-w-xs w-full">
  <div id="toastContent" class="rounded-xl px-4 py-3 shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
    <span id="toastMessage" class="text-sm font-medium text-white"></span>
  </div>
</div>

<script>
class PasswordChanger {
  constructor() {
    this.form = document.getElementById('changePasswordForm');
    this.cancelButton = document.getElementById('cancelButton');
    this.init();
  }
  init() {
    this.form.addEventListener('submit', this.handleSubmit.bind(this));
    this.cancelButton.addEventListener('click', this.handleCancel.bind(this));
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', this.togglePasswordVisibility.bind(this));
    });
    document.getElementById('newPassword').addEventListener('input', this.updateStrength.bind(this));
    document.getElementById('confirmPassword').addEventListener('input', this.validatePasswordMatch.bind(this));
  }
  togglePasswordVisibility(e) {
    const targetId = e.currentTarget.getAttribute('data-target');
    const input = document.getElementById(targetId);
    const icon = e.currentTarget.querySelector('span');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  }
  updateStrength() {
    const val = document.getElementById('newPassword').value;
    const s1 = document.getElementById('strength-s1');
    const s2 = document.getElementById('strength-s2');
    const s3 = document.getElementById('strength-s3');
    const lbl = document.getElementById('strength-label');
    const hasUpper = /[A-Z]/.test(val);
    const hasNum = /[0-9]/.test(val);
    const hasSpec = /[^A-Za-z0-9]/.test(val);
    const score = (val.length >= 8 ? 1 : 0) + (hasUpper || hasNum ? 1 : 0) + (hasSpec ? 1 : 0);
    s1.style.opacity = val.length ? '1' : '0.2';
    s2.style.opacity = score >= 2 ? '1' : '0.2';
    s3.style.opacity = score >= 3 ? '1' : '0.2';
    if (!val.length) { lbl.textContent = ''; return; }
    lbl.textContent = score === 1 ? 'Weak' : score === 2 ? 'Fair' : 'Strong';
    lbl.className = `text-xs mt-1 text-right ${score === 1 ? 'text-error' : score === 2 ? 'text-[#f59e0b]' : 'text-primary'}`;
  }
  validatePasswordMatch() {
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    const confirmInput = document.getElementById('confirmPassword');
    if (confirmPwd && newPwd !== confirmPwd) {
      confirmInput.setCustomValidity('Passwords do not match');
    } else {
      confirmInput.setCustomValidity('');
    }
  }
  async handleSubmit(e) {
    e.preventDefault();
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    if (!currentPassword || !newPassword || !confirmPassword) { this.showToast('All fields are required', 'error'); return; }
    if (newPassword.length < 8) { this.showToast('New password must be at least 8 characters', 'error'); return; }
    if (newPassword !== confirmPassword) { this.showToast('New passwords do not match', 'error'); return; }
    if (currentPassword === newPassword) { this.showToast('New password must differ from current password', 'error'); return; }
    const submitButton = document.getElementById('changePasswordButton');
    const originalHTML = submitButton.innerHTML;
    try {
      submitButton.disabled = true;
      submitButton.innerHTML = '<span class="spinner"></span> Changing...';
      const token = localStorage.getItem('authToken') || localStorage.getItem('userToken');
      if (!token) throw new Error('Not authenticated. Please login again.');
      const response = await fetch('/api/user/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ oldPassword: currentPassword, newPassword })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      if (!data.success) throw new Error(data.error || 'Failed to change password');
      this.showToast('Password changed successfully!', 'success');
      this.form.reset();
      setTimeout(() => { window.location.href = '/profile'; }, 2000);
    } catch (error) {
      console.error('Password change failed:', error);
      this.showToast(error.message, 'error');
    } finally {
      submitButton.disabled = false;
      submitButton.innerHTML = originalHTML;
    }
  }
  handleCancel() {
    if (confirm('Discard changes and go back?')) { window.location.href = '/profile'; }
  }
  showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    const toastContent = document.getElementById('toastContent');
    const toastMessage = document.getElementById('toastMessage');
    toastMessage.textContent = message;
    toastContent.style.background =
      type === 'success' ? 'linear-gradient(135deg,#166534,#15803d)' :
      type === 'error'   ? 'linear-gradient(135deg,#7f1d1d,#991b1b)' :
      type === 'warning' ? 'linear-gradient(135deg,#78350f,#92400e)' :
                           'linear-gradient(135deg,#C2777A,#E8A598)';
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 5000);
  }
}
document.addEventListener('DOMContentLoaded', () => new PasswordChanger());
</script>
</body>
</html>
